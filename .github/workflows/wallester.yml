name: Wallester Final Fix (POST + Format)

on:
  workflow_dispatch:

jobs:
  reveal-and-format:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install PyJWT cryptography requests

      - name: Execute Format
        shell: python
        env:
          API_KEY: ${{ secrets.WALLESTER_API_KEY }}
          B64_PRIVATE_KEY: ${{ secrets.WALLESTER_PRIVATE_KEY }}
        run: |
          import os, time, jwt, requests, sys, base64, uuid, json
          from cryptography.hazmat.primitives import serialization, hashes
          from cryptography.hazmat.primitives.asymmetric import padding
          from datetime import datetime

          # 1. Setup
          CARD_ID = "d82d7c29-f599-4d39-83b0-0b1a9bf6fed7"
          BASE_URL = f"https://api-frontend.wallester.com/v1/cards/{CARD_ID}"
          
          try:
              pem_data = base64.b64decode(os.getenv("B64_PRIVATE_KEY")).decode('utf-8').strip()
              private_key = serialization.load_pem_private_key(pem_data.encode('utf-8'), password=None)
          except Exception as e:
              print(f"❌ Key Error: {e}"); sys.exit(1)

          def get_headers():
              token = jwt.encode({"api_key": os.getenv("API_KEY"), "ts": int(time.time())}, private_key, algorithm="RS256")
              return {"Authorization": f"Bearer {token}", "X-Request-ID": str(uuid.uuid4()), "Content-Type": "application/json"}

          def decrypt_field(enc_b64, label):
              if not enc_b64: return None
              try:
                  # Use the RSA-OAEP label (CardNumber or CVV)
                  return private_key.decrypt(
                      base64.b64decode(enc_b64),
                      padding.OAEP(mgf=padding.MGF1(hashes.SHA256()), algorithm=hashes.SHA256(), label=label.encode())
                  ).decode('utf-8')
              except:
                  try: # Fallback without label
                      return private_key.decrypt(
                          base64.b64decode(enc_b64),
                          padding.OAEP(mgf=padding.MGF1(hashes.SHA256()), algorithm=hashes.SHA256(), label=None)
                      ).decode('utf-8')
                  except: return None

          # 2. Fetch Metadata (GET) for Expiry
          res_meta = requests.get(BASE_URL, headers=get_headers())
          
          # 3. Fetch Sensitive Data (POST) to fix 405 error
          res_pan = requests.post(f"{BASE_URL}/encrypted-card-number", headers=get_headers())
          res_cvv = requests.post(f"{BASE_URL}/encrypted-cvv2", headers=get_headers())

          # 4. Process and Format
          if all(r.status_code == 200 for r in [res_meta, res_pan, res_cvv]):
              # Expiry: Extract MM/YY from ISO "YYYY-MM-DD..."
              exp_iso = res_meta.json().get('card', {}).get('expiry_date', "2000-01-01")
              dt = datetime.strptime(exp_iso.split('T')[0], '%Y-%m-%d')
              mm, yy = dt.strftime('%m'), dt.strftime('%y')

              # Decrypt
              pan = decrypt_field(res_pan.json().get('encrypted_card_number'), "CardNumber")
              cvv = decrypt_field(res_cvv.json().get('encrypted_cvv2'), "CVV")

              if pan and cvv:
                  print("\n" + "="*40)
                  print(f"RESULT: {pan}|{mm}|{yy}|{cvv}")
                  print("="*40 + "\n")
              else:
                  print("❌ Decryption failed. Verify private key.")
          else:
              print(f"❌ Error: Meta:{res_meta.status_code} PAN:{res_pan.status_code} CVV:{res_cvv.status_code}")
