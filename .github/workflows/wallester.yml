name: Issue Wallester Business Card

on:
  workflow_dispatch:
    inputs:
      account_id:
        description: 'The UUID of the Wallester Account'
        required: true
        default: '06691820-662d-43e9-9ac3-29b61d1476d7'

jobs:
  issue-virtual-card:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install PyJWT cryptography requests

      - name: Generate JWT and Request Card
        shell: python
        env:
          API_KEY: ${{ secrets.WALLESTER_API_KEY }}
          # This should be the PEM content, NOT base64 encoded in the secret itself 
          # to avoid double-encoding confusion.
          PRIVATE_KEY_PEM: ${{ secrets.WALLESTER_PRIVATE_KEY }}
          ACCOUNT_ID: ${{ github.event.inputs.account_id }}
        run: |
          import os, time, jwt, requests, sys, uuid

          # 1. Load Environment Variables
          api_key = os.getenv("API_KEY")
          private_key_pem = os.getenv("PRIVATE_KEY_PEM")
          account_id = os.getenv("ACCOUNT_ID")

          if not all([api_key, private_key_pem, account_id]):
              print("❌ Missing required environment variables/secrets.")
              sys.exit(1)

          # 2. Generate Timestamp and Token
          # We generate this as late as possible because of the 5-second rule
          timestamp = int(time.time())
          
          payload = {
              "api_key": api_key,
              "ts": timestamp
          }

          try:
              # Wallester expects RS256. Ensure the key is a valid PEM string.
              token = jwt.encode(payload, private_key_pem, algorithm="RS256")
          except Exception as e:
              print(f"❌ JWT Signing Failed: {e}")
              print("💡 Ensure your secret starts with '-----BEGIN RSA PRIVATE KEY-----'")
              sys.exit(1)

          # 3. Prepare API Request
          url = "https://api.wallester.com/v1/cards"
          
          request_headers = {
              "Authorization": f"Bearer {token}",
              "Content-Type": "application/json",
              # Documentation mentions X-Request-ID is required for consistent tracking
              "X-Request-ID": str(uuid.uuid4()),
              "User-Agent": "Wallester-Python-Integration/1.1"
          }
          
          body = {
              "account_id": account_id,
              "type": "Virtual",
              "currency_code": "EUR"
          }

          # 4. Execute and Validate
          try:
              print(f"🚀 Requesting Card for Account: {account_id} (TS: {timestamp})")
              response = requests.post(url, json=body, headers=request_headers, timeout=10)
              
              if response.status_code in [200, 201]:
                  print("✅ Success! Card Created.")
                  print(response.json())
              else:
                  print(f"❌ API Error: {response.status_code}")
                  print(f"Response: {response.text}")
                  
                  if response.status_code == 401:
                      print("💡 Auth Failed: Check if your API Key is active or if GitHub's clock is out of sync.")
                  sys.exit(1)

          except requests.exceptions.RequestException as e:
              print(f"❌ Connection Error: {e}")
              sys.exit(1)
