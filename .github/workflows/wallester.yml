name: Wallester Reveal - PEM Wrapper Fix

on:
  workflow_dispatch:

jobs:
  reveal-details:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install PyJWT cryptography requests

      - name: Execute
        shell: python
        env:
          API_KEY: ${{ secrets.WALLESTER_API_KEY }}
          B64_PRIVATE_KEY: ${{ secrets.WALLESTER_PRIVATE_KEY }}
        run: |
          import os, time, jwt, requests, sys, base64, uuid, json, re
          from cryptography.hazmat.primitives import serialization, hashes
          from cryptography.hazmat.primitives.asymmetric import padding
          from datetime import datetime

          # --- 1. SETUP ---
          print("🛠️ [STEP 1] Preparing RSA Keys...")
          try:
              pem_data = base64.b64decode(os.getenv("B64_PRIVATE_KEY")).decode('utf-8').strip()
              private_key = serialization.load_pem_private_key(pem_data.encode('utf-8'), password=None)
              pub_pem = private_key.public_key().public_bytes(
                  encoding=serialization.Encoding.PEM,
                  format=serialization.PublicFormat.SubjectPublicKeyInfo
              )
              pub_b64 = base64.b64encode(pub_pem).decode('utf-8')
          except Exception as e:
              print(f"❌ Key Error: {e}"); sys.exit(1)

          def clean_pem_payload(raw_data, label_name):
              """Removes -----BEGIN...----- wrappers and whitespace."""
              if not raw_data: return None
              print(f"\n📦 Cleaning {label_name} Payload...")
              
              # Remove the Header/Footer lines and all whitespace/newlines
              cleaned = re.sub(r'-----BEGIN.*?-----', '', raw_data)
              cleaned = re.sub(r'-----END.*?-----', '', cleaned)
              cleaned = "".join(cleaned.split()) # Removes \n, \r, spaces
              
              print(f"   Original Len: {len(raw_data)} | Cleaned Len: {len(cleaned)}")
              
              # Fix Padding
              pad_needed = len(cleaned) % 4
              if pad_needed:
                  cleaned += "=" * (4 - pad_needed)
              
              try:
                  return base64.b64decode(cleaned)
              except Exception as e:
                  print(f"   ❌ Base64 Error: {e}")
                  return None

          def decrypt_brute(encrypted_bytes, label_str):
              if not encrypted_bytes: return None
              # Matrix: Try SHA-256 (standard) and SHA-1 (legacy HSM)
              for h_alg in [hashes.SHA256(), hashes.SHA1()]:
                  for lbl in [label_str.encode(), None]:
                      try:
                          return private_key.decrypt(
                              encrypted_bytes,
                              padding.OAEP(mgf=padding.MGF1(algorithm=h_alg), algorithm=h_alg, label=lbl)
                          ).decode('utf-8')
                      except: continue
              return None

          # --- 2. API EXECUTION ---
          CARD_ID = "d82d7c29-f599-4d39-83b0-0b1a9bf6fed7"
          headers = {
              "Authorization": f"Bearer {jwt.encode({'api_key': os.getenv('API_KEY'), 'ts': int(time.time())}, private_key, algorithm='RS256')}",
              "X-Request-ID": str(uuid.uuid4()),
              "Content-Type": "application/json"
          }
          payload = {"public_key": pub_b64}

          res_m = requests.get(f"https://api-frontend.wallester.com/v1/cards/{CARD_ID}", headers=headers)
          res_p = requests.post(f"https://api-frontend.wallester.com/v1/cards/{CARD_ID}/encrypted-card-number", headers=headers, json=payload)
          res_c = requests.post(f"https://api-frontend.wallester.com/v1/cards/{CARD_ID}/encrypted-cvv2", headers=headers, json=payload)

          # --- 3. DECRYPT & FORMAT ---
          if res_p.status_code == 200 and res_c.status_code == 200:
              # Expiry
              exp_iso = res_m.json().get('card', {}).get('expiry_date', "2000-01-01")
              dt = datetime.strptime(exp_iso.split('T')[0], '%Y-%m-%d')
              
              # Decrypt
              pan_bytes = clean_pem_payload(res_p.json().get('encrypted_card_number'), "PAN")
              cvv_bytes = clean_pem_payload(res_c.json().get('encrypted_cvv2'), "CVV")
              
              pan = decrypt_brute(pan_bytes, "CardNumber")
              cvv = decrypt_brute(cvv_bytes, "CVV")

              if pan and cvv:
                  print("\n" + "⭐" * 40)
                  print(f"RESULT: {pan}|{dt.strftime('%m')}|{dt.strftime('%y')}|{cvv}")
                  print("⭐" * 40)
              else:
                  print("\n❌ Decryption Failed. Bytes were cleaned, but RSA padding/hash did not match.")
          else:
              print(f"❌ API Error: {res_p.status_code} / {res_c.status_code}")
