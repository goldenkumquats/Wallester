name: Wallester - Create and Reveal (Harden)

on:
  workflow_dispatch:

jobs:
  create-and-reveal:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install PyJWT cryptography requests

      - name: Execute
        shell: python
        env:
          API_KEY: ${{ secrets.WALLESTER_API_KEY }}
          B64_PRIVATE_KEY: ${{ secrets.WALLESTER_PRIVATE_KEY }}
          PROFILE_ID: ${{ secrets.WALLESTER_PROFILE_ID }}
          ACCOUNT_ID: ${{ secrets.WALLESTER_ACCOUNT_ID }}
        run: |
          import os, time, jwt, requests, sys, base64, uuid, re
          from cryptography.hazmat.primitives import serialization, hashes
          from cryptography.hazmat.primitives.asymmetric import padding
          from datetime import datetime

          # --- 1. KEY SETUP ---
          try:
              # Strip any whitespace from the secret
              b64_str = os.getenv("B64_PRIVATE_KEY").strip()
              raw_key_bytes = base64.b64decode(b64_str)
              private_key = serialization.load_pem_private_key(raw_key_bytes, password=None)
              
              pub_pem = private_key.public_key().public_bytes(
                  encoding=serialization.Encoding.PEM,
                  format=serialization.PublicFormat.SubjectPublicKeyInfo
              ).decode('utf-8')
              pub_b64 = base64.b64encode(pub_pem.encode('utf-8')).decode('utf-8')
          except Exception as e:
              print(f"❌ Key Loading Error: {e}"); sys.exit(1)

          # --- 2. AUTH HELPERS ---
          def get_headers():
              return {
                  "Authorization": f"Bearer {jwt.encode({'api_key': os.getenv('API_KEY').strip(), 'ts': int(time.time())}, private_key, algorithm='RS256')}",
                  "X-Request-ID": str(uuid.uuid4()),
                  "Content-Type": "application/json"
              }

          # --- 3. CREATE NEW CARD (DEFENSIVE) ---
          # Clean the UUIDs
          act_id = os.getenv("ACCOUNT_ID").strip()
          prf_id = os.getenv("PROFILE_ID").strip()

          # Wallester 'type' can be 'virtual' or 'virtual_disposable'
          # We'll use 'virtual' but print a hint if it fails
          create_payload = {
              "account_id": act_id,
              "card_metadata_profile_id": prf_id,
              "type": "virtual", 
              "public_key": pub_b64
          }

          print(f"📡 Requesting new card for account {act_id[:8]}...")
          res = requests.post("https://api-frontend.wallester.com/v1/cards", 
                             headers=get_headers(), json=create_payload)

          if not res.ok:
              print(f"❌ Creation Failed: {res.status_code}")
              print(f"DEBUG: {res.text}")
              if "type" in res.text:
                  print("💡 TIP: Try changing 'type' in the script to 'virtual_disposable' or 'VIRTUAL'.")
              sys.exit(1)

          card_data = res.json()['card']
          CARD_ID = card_data['id']
          print(f"✅ Card Created: {CARD_ID}")

          # --- 4. REVEAL & DECRYPT ---
          def reveal_field(endpoint, label):
              url = f"https://api-frontend.wallester.com/v1/cards/{CARD_ID}/{endpoint}"
              resp = requests.post(url, headers=get_headers(), json={"public_key": pub_b64})
              if not resp.ok: return None
              
              enc_str = resp.json().get(endpoint.replace('-', '_'))
              clean = re.sub(r'-----BEGIN.*?-----|-----END.*?-----', '', enc_str)
              ciphertext = base64.b64decode("".join(clean.split()))
              
              return private_key.decrypt(
                  ciphertext,
                  padding.OAEP(mgf=padding.MGF1(algorithm=hashes.SHA256()), algorithm=hashes.SHA256(), label=label.encode())
              ).decode('utf-8')

          pan = reveal_field("encrypted-card-number", "CardNumber")
          cvv = reveal_field("encrypted-cvv2", "CVV2")

          if pan and cvv:
              exp_date = card_data['expiry_date'].split('T')[0]
              dt = datetime.strptime(exp_date, '%Y-%m-%d')
              print(f"\n✨ NEW CARD DATA:\n{'='*30}")
              print(f"{pan}|{dt.strftime('%m')}|{dt.strftime('%y')}|{cvv}")
              print(f"{'='*30}")
