name: Issue Wallester Business Card

on:
  workflow_dispatch:
    inputs:
      account_id:
        description: 'The UUID of the Wallester Account'
        required: true

jobs:
  issue-virtual-card:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install PyJWT cryptography requests

      - name: Generate JWT and Request Card
        shell: python
        env:
          API_KEY: ${{ secrets.WALLESTER_API_KEY }}
          # This is now the Base64 string
          B64_PRIVATE_KEY: ${{ secrets.WALLESTER_PRIVATE_KEY }}
          ACCOUNT_ID: ${{ github.event.inputs.account_id }}
        run: |
          import os
          import time
          import jwt
          import requests
          import base64
          import sys

          # 1. Load and Decode Secret
          api_key = os.getenv("API_KEY")
          b64_key = os.getenv("B64_PRIVATE_KEY")
          account_id = os.getenv("ACCOUNT_ID")

          try:
              # Decode Base64 back to the original PEM format
              private_key_pem = base64.b64decode(b64_key).decode('utf-8')
          except Exception as e:
              print(f"❌ Base64 Decode Failed: {e}")
              sys.exit(1)

          # 2. Prepare JWT Payload
          payload = {
              "api_key": api_key,
              "ts": int(time.time())
          }

          # 3. Sign the JWT
          try:
              # RS256 requires the private key
              token = jwt.encode(payload, private_key_pem, algorithm="RS256")
          except Exception as e:
              print(f"❌ Signing Failed: {e}")
              print("Check if the secret starts with -----BEGIN RSA PRIVATE KEY-----")
              sys.exit(1)

          # 4. API Request
          url = "https://api.wallester.com/v1/cards"
          headers = {
              "Authorization": f"Bearer {token}",
              "Content-Type": "application/json"
          }
          body = {
              "account_id": account_id,
              "type": "Virtual",
              "currency_code": "EUR"
          }

          print(f"🚀 Sending request for Account: {account_id}...")
          response = requests.post(url, json=body, headers=headers)

          if response.status_code in [200, 201]:
              print("✅ Success! Card Created.")
              print(response.json())
          else:
              print(f"❌ Failed. Status: {response.status_code}")
              print(f"Response: {response.text}")
              sys.exit(1)
