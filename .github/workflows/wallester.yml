name: Wallester - Create and Reveal

on:
  workflow_dispatch:

jobs:
  create-and-reveal:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install PyJWT cryptography requests

      - name: Execute
        shell: python
        env:
          API_KEY: ${{ secrets.WALLESTER_API_KEY }}
          B64_PRIVATE_KEY: ${{ secrets.WALLESTER_PRIVATE_KEY }}
          # You need a valid Profile ID from your Wallester Dashboard
          PROFILE_ID: "REPLACE_WITH_YOUR_CARD_PROFILE_ID" 
          ACCOUNT_ID: "REPLACE_WITH_YOUR_ACCOUNT_ID"
        run: |
          import os, time, jwt, requests, sys, base64, uuid, re, json
          from cryptography.hazmat.primitives import serialization, hashes
          from cryptography.hazmat.primitives.asymmetric import padding
          from datetime import datetime

          # --- 1. KEY SETUP ---
          raw_key_bytes = base64.b64decode(os.getenv("B64_PRIVATE_KEY"))
          private_key = serialization.load_pem_private_key(raw_key_bytes, password=None)
          pub_pem = private_key.public_key().public_bytes(
              encoding=serialization.Encoding.PEM,
              format=serialization.PublicFormat.SubjectPublicKeyInfo
          ).decode('utf-8')
          pub_b64_payload = base64.b64encode(pub_pem.encode('utf-8')).decode('utf-8')

          # --- 2. AUTH & HEADERS ---
          def get_headers():
              return {
                  "Authorization": f"Bearer {jwt.encode({'api_key': os.getenv('API_KEY'), 'ts': int(time.time())}, private_key, algorithm='RS256')}",
                  "X-Request-ID": str(uuid.uuid4()),
                  "Content-Type": "application/json"
              }

          # --- 3. CREATE NEW CARD ---
          print("🆕 Creating new virtual card...")
          create_payload = {
              "account_id": os.getenv("ACCOUNT_ID"),
              "card_metadata_profile_id": os.getenv("PROFILE_ID"),
              "type": "virtual",
              "public_key": pub_b64_payload  # Binding the key at creation
          }
          
          create_res = requests.post("https://api-frontend.wallester.com/v1/cards", 
                                    headers=get_headers(), json=create_payload)
          
          if not create_res.ok:
              print(f"❌ Creation Failed: {create_res.text}")
              sys.exit(1)
          
          card = create_res.json()['card']
          CARD_ID = card['id']
          print(f"✅ Card Created: {CARD_ID}")

          # --- 4. REVEAL DETAILS ---
          # Wait 1s for the HSM to sync
          time.sleep(1) 
          
          def reveal(endpoint, label):
              url = f"https://api-frontend.wallester.com/v1/cards/{CARD_ID}/{endpoint}"
              res = requests.post(url, headers=get_headers(), json={"public_key": pub_b64_payload})
              if not res.ok: return None
              
              enc_val = res.json().get(endpoint.replace('-', '_'))
              clean = re.sub(r'-----BEGIN.*?-----|-----END.*?-----', '', enc_val)
              ciphertext = base64.b64decode("".join(clean.split()))
              
              return private_key.decrypt(
                  ciphertext,
                  padding.OAEP(mgf=padding.MGF1(algorithm=hashes.SHA256()), algorithm=hashes.SHA256(), label=label.encode())
              ).decode('utf-8')

          pan = reveal("encrypted-card-number", "CardNumber")
          cvv = reveal("encrypted-cvv2", "CVV2")

          if pan and cvv:
              dt = datetime.strptime(card['expiry_date'].split('T')[0], '%Y-%m-%d')
              print(f"\n⭐ NEW CARD READY:\n{pan}|{dt.strftime('%m')}|{dt.strftime('%y')}|{cvv}")
          else:
              print("❌ Card created but decryption failed.")
