name: Wallester - Create and Reveal Card
on:
  workflow_dispatch:

jobs:
  manage-card:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install PyJWT cryptography requests

      - name: Execute Card Lifecycle
        shell: python
        env:
          API_KEY: ${{ secrets.WALLESTER_API_KEY }}
          B64_PRIVATE_KEY: ${{ secrets.WALLESTER_PRIVATE_KEY }}
          # These should be updated to your specific Wallester account IDs
          CUSTOMER_ID: "00000000-0000-0000-0000-000000000000"
          PROGRAM_ID: "00000000-0000-0000-0000-000000000000"
        run: |
          import os, time, jwt, requests, sys, base64, uuid, re, json
          from cryptography.hazmat.primitives import serialization, hashes
          from cryptography.hazmat.primitives.asymmetric import padding
          from datetime import datetime

          # 1. KEY SETUP
          try:
              raw_key_bytes = base64.b64decode(os.getenv("B64_PRIVATE_KEY"))
              private_key = serialization.load_pem_private_key(raw_key_bytes, password=None)
              
              pub_pem = private_key.public_key().public_bytes(
                  encoding=serialization.Encoding.PEM,
                  format=serialization.PublicFormat.SubjectPublicKeyInfo
              ).decode('utf-8')
              pub_b64 = base64.b64encode(pub_pem.encode('utf-8')).decode('utf-8')
          except Exception as e:
              print(f"❌ Key Error: {e}"); sys.exit(1)

          # 2. AUTHENTICATION HELPER
          def get_headers():
              token = jwt.encode(
                  {'api_key': os.getenv('API_KEY'), 'ts': int(time.time())}, 
                  private_key, 
                  algorithm='RS256'
              )
              return {
                  "Authorization": f"Bearer {token}",
                  "X-Request-ID": str(uuid.uuid4()),
                  "Content-Type": "application/json"
              }

          # 3. CREATE CARD
          print("--- Step 1: Creating New Card ---")
          create_payload = {
              "customer_id": os.getenv("CUSTOMER_ID"),
              "card_program_id": os.getenv("PROGRAM_ID"),
              "type": "VIRTUAL"
          }
          
          create_res = requests.post(
              "https://api-frontend.wallester.com/v1/cards", 
              headers=get_headers(), 
              json=create_payload
          )
          
          if create_res.status_code != 201:
              print(f"❌ Creation Failed: {create_res.text}")
              sys.exit(1)
          
          card_data = create_res.json()
          CARD_ID = card_data.get('id')
          print(f"✅ Card Created Successfully. ID: {CARD_ID}")

          # 4. FETCH ENCRYPTED DATA
          print("\n--- Step 2: Retrieving Sensitive Data ---")
          body = {"public_key": pub_b64}
          
          res_m = requests.get(f"https://api-frontend.wallester.com/v1/cards/{CARD_ID}", headers=get_headers()).json()
          res_p = requests.post(f"https://api-frontend.wallester.com/v1/cards/{CARD_ID}/encrypted-card-number", headers=get_headers(), json=body).json()
          res_c = requests.post(f"https://api-frontend.wallester.com/v1/cards/{CARD_ID}/encrypted-cvv2", headers=get_headers(), json=body).json()

          # 5. DECRYPTION UTILITY
          def exhaustive_decrypt(data, possible_labels):
              if not data: return None
              clean = re.sub(r'-----BEGIN.*?-----|-----END.*?-----', '', data)
              clean = "".join(clean.split())
              ciphertext = base64.b64decode(clean)
              
              for mgf_alg in [hashes.SHA256(), hashes.SHA1()]:
                  for lbl in possible_labels:
                      try:
                          decrypted = private_key.decrypt(
                              ciphertext,
                              padding.OAEP(
                                  mgf=padding.MGF1(algorithm=mgf_alg),
                                  algorithm=hashes.SHA256(),
                                  label=lbl.encode()
                              )
                          )
                          return decrypted.decode('utf-8')
                      except:
                          continue
              return None

          # 6. REVEAL
          pan = exhaustive_decrypt(res_p.get('encrypted_card_number'), ["CardNumber"])
          cvv = exhaustive_decrypt(res_c.get('encrypted_cvv2'), ["CVV", "CVV2", "Cvv"])

          if pan and cvv:
              exp = res_m.get('card', {}).get('expiry_date', "2000-01-01")
              dt = datetime.strptime(exp.split('T')[0], '%Y-%m-%d')
              print(f"\n✅ REVEAL SUCCESS\n{'='*40}")
              print(f"RESULT: {pan}|{dt.strftime('%m')}|{dt.strftime('%y')}|{cvv}")
              print(f"{'='*40}")
          else:
              print(f"❌ Decryption Error. PAN: {'Found' if pan else 'None'}, CVV: {'Found' if cvv else 'None'}")
