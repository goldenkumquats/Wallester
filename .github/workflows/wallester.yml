name: Wallester Reveal - Final Implementation

on:
  workflow_dispatch:

jobs:
  reveal-card:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install PyJWT cryptography requests

      - name: Execute Reveal
        shell: python
        env:
          API_KEY: ${{ secrets.WALLESTER_API_KEY }}
          B64_PRIVATE_KEY: ${{ secrets.WALLESTER_PRIVATE_KEY }}
        run: |
          import os, time, jwt, requests, sys, base64, uuid, re
          from cryptography.hazmat.primitives import serialization, hashes
          from cryptography.hazmat.primitives.asymmetric import padding
          from datetime import datetime

          # --- 1. KEY INITIALIZATION ---
          print("🛠️ [STEP 1] Loading RSA Keys...")
          try:
              # Decode the GH Secret to get the PEM
              pem_data = base64.b64decode(os.getenv("B64_PRIVATE_KEY")).decode('utf-8').strip()
              private_key = serialization.load_pem_private_key(pem_data.encode('utf-8'), password=None)
              
              # Generate Public Key in PEM format as required by Docs
              public_key = private_key.public_key()
              pub_pem = public_key.public_bytes(
                  encoding=serialization.Encoding.PEM,
                  format=serialization.PublicFormat.SubjectPublicKeyInfo
              ).decode('utf-8')
              
              # Base64 encode the ENTIRE PEM string (including headers)
              pub_b64 = base64.b64encode(pub_pem.encode('utf-8')).decode('utf-8')
              print("✅ Keys loaded and Public Key encoded to Base64.")
          except Exception as e:
              print(f"❌ Key Error: {e}"); sys.exit(1)

          # --- 2. HELPERS ---
          def get_auth_header():
              # JWT has a 5-second TTL per docs
              payload = {"api_key": os.getenv("API_KEY"), "ts": int(time.time())}
              token = jwt.encode(payload, private_key, algorithm="RS256")
              return {"Authorization": f"Bearer {token}", "X-Request-ID": str(uuid.uuid4()), "Content-Type": "application/json"}

          def clean_and_decrypt(encrypted_val, label):
              if not encrypted_val: return None
              # Strip PEM wrappers and newlines
              clean = re.sub(r'-----BEGIN.*?-----|-----END.*?-----', '', encrypted_val)
              clean = "".join(clean.split())
              ciphertext = base64.b64decode(clean)
              
              # Wallester standard: OAEP with SHA256 and field labels
              try:
                  return private_key.decrypt(
                      ciphertext,
                      padding.OAEP(
                          mgf=padding.MGF1(algorithm=hashes.SHA256()),
                          algorithm=hashes.SHA256(),
                          label=label.encode()
                      )
                  ).decode('utf-8')
              except Exception as e:
                  print(f"   ⚠️ Decryption failed for {label}: {e}")
                  return None

          # --- 3. EXECUTION ---
          CARD_ID = "d82d7c29-f599-4d39-83b0-0b1a9bf6fed7"
          URL = f"https://api-frontend.wallester.com/v1/cards/{CARD_ID}"
          
          print(f"📡 Requesting data for Card: {CARD_ID}")
          headers = get_auth_header()
          body = {"public_key": pub_b64}

          # Get Metadata
          res_m = requests.get(URL, headers=headers).json()
          
          # Get Encrypted Values
          res_p = requests.post(f"{URL}/encrypted-card-number", headers=headers, json=body).json()
          res_c = requests.post(f"{URL}/encrypted-cvv2", headers=headers, json=body).json()

          # --- 4. DECRYPT & DISPLAY ---
          pan = clean_and_decrypt(res_p.get('encrypted_card_number'), "CardNumber")
          cvv = clean_and_decrypt(res_c.get('encrypted_cvv2'), "CVV")
          
          if pan and cvv:
              exp_raw = res_m.get('card', {}).get('expiry_date', "2000-01-01")
              dt = datetime.strptime(exp_raw.split('T')[0], '%Y-%m-%d')
              print(f"\n⭐ RESULT: {pan}|{dt.strftime('%m')}|{dt.strftime('%y')}|{cvv}")
          else:
              print("\n❌ Failed to decrypt. Verify your Private Key matches the one used at card creation.")
