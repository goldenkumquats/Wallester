name: Wallester Final Reveal (PEM + Label Fix)

on:
  workflow_dispatch:

jobs:
  reveal:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install PyJWT cryptography requests

      - name: Execute
        shell: python
        env:
          API_KEY: ${{ secrets.WALLESTER_API_KEY }}
          B64_PRIVATE_KEY: ${{ secrets.WALLESTER_PRIVATE_KEY }}
        run: |
          import os, time, jwt, requests, sys, base64, uuid, re
          from cryptography.hazmat.primitives import serialization, hashes
          from cryptography.hazmat.primitives.asymmetric import padding
          from datetime import datetime

          # 1. Initialize RSA
          try:
              pem_data = base64.b64decode(os.getenv("B64_PRIVATE_KEY")).decode('utf-8').strip()
              private_key = serialization.load_pem_private_key(pem_data.encode('utf-8'), password=None)
              pub_bytes = private_key.public_key().public_bytes(
                  encoding=serialization.Encoding.PEM,
                  format=serialization.PublicFormat.SubjectPublicKeyInfo
              )
              pub_b64 = base64.b64encode(pub_bytes).decode('utf-8')
          except Exception as e:
              print(f"❌ Key Error: {e}"); sys.exit(1)

          def wallester_decrypt(pem_string, label_text):
              if not pem_string: return None
              # Strip PEM headers/footers and newlines
              clean = re.sub(r'-----BEGIN.*?-----', '', pem_string)
              clean = re.sub(r'-----END.*?-----', '', clean)
              clean = "".join(clean.split())
              
              # Standard RSA-OAEP with SHA256 and required Label
              try:
                  ciphertext = base64.b64decode(clean)
                  return private_key.decrypt(
                      ciphertext,
                      padding.OAEP(
                          mgf=padding.MGF1(algorithm=hashes.SHA256()),
                          algorithm=hashes.SHA256(),
                          label=label_text.encode()
                      )
                  ).decode('utf-8')
              except Exception as e:
                  print(f"   ⚠️ Decryption failed for {label_text}: {e}")
                  return None

          # 2. Fetch Data
          headers = {
              "Authorization": f"Bearer {jwt.encode({'api_key': os.getenv('API_KEY'), 'ts': int(time.time())}, private_key, algorithm='RS256')}",
              "X-Request-ID": str(uuid.uuid4()),
              "Content-Type": "application/json"
          }
          CARD_ID = "d82d7c29-f599-4d39-83b0-0b1a9bf6fed7"
          BASE = f"https://api-frontend.wallester.com/v1/cards/{CARD_ID}"
          
          meta = requests.get(BASE, headers=headers).json()
          res_p = requests.post(f"{BASE}/encrypted-card-number", headers=headers, json={"public_key": pub_b64}).json()
          res_c = requests.post(f"{BASE}/encrypted-cvv2", headers=headers, json={"public_key": pub_b64}).json()

          # 3. Process Result
          pan = wallester_decrypt(res_p.get('encrypted_card_number'), "CardNumber")
          cvv = wallester_decrypt(res_c.get('encrypted_cvv2'), "CVV")
          
          if pan and cvv:
              exp_raw = meta.get('card', {}).get('expiry_date', "2000-01-01")
              dt = datetime.strptime(exp_raw.split('T')[0], '%Y-%m-%d')
              print(f"\n✅ SUCCESS\n{'='*40}")
              print(f"RESULT: {pan}|{dt.strftime('%m')}|{dt.strftime('%y')}|{cvv}")
              print(f"{'='*40}\n")
          else:
              print("❌ Execution failed. Check the logs above.")
