name: Wallester Full Card Lifecycle

on:
  workflow_dispatch:

jobs:
  issue-and-reveal:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install PyJWT cryptography requests

      - name: Run Wallester Flow
        shell: python
        env:
          API_KEY: ${{ secrets.WALLESTER_API_KEY }}
          B64_PRIVATE_KEY: ${{ secrets.WALLESTER_PRIVATE_KEY }}
          TDS_PASSWORD: ${{ secrets.WALLESTER_3DS_PASSWORD }}
        run: |
          import os, time, jwt, requests, sys, base64, uuid, json
          from cryptography.hazmat.primitives import serialization, hashes
          from cryptography.hazmat.primitives.asymmetric import padding

          # --- 1. KEY MANAGEMENT ---
          try:
              # Load Private Key from Secret
              pem_data = base64.b64decode(os.getenv("B64_PRIVATE_KEY")).decode('utf-8').strip()
              private_key = serialization.load_pem_private_key(pem_data.encode('utf-8'), password=None)
              
              # Derive Public Key for the RSA Exchange (Required to see PAN/CVV)
              public_key = private_key.public_key()
              pub_pem = public_key.public_bytes(
                  encoding=serialization.Encoding.PEM,
                  format=serialization.PublicFormat.SubjectPublicKeyInfo
              )
              # Wallester expects the PEM string itself to be Base64 encoded
              pub_b64 = base64.b64encode(pub_pem).decode('utf-8')
          except Exception as e:
              print(f"❌ Key Setup Error: {e}"); sys.exit(1)

          def get_auth_header():
              token = jwt.encode(
                  {"api_key": os.getenv("API_KEY"), "ts": int(time.time())}, 
                  private_key, 
                  algorithm="RS256"
              )
              return {
                  "Authorization": f"Bearer {token}",
                  "Content-Type": "application/json",
                  "X-Request-ID": str(uuid.uuid4())
              }

          # --- 2. CONFIGURATION ---
          ACCOUNT_ID = "06691820-662d-43e9-9ac3-29b61d1476d7"
          BASE_URL = "https://api-frontend.wallester.com/v1"
          
          # --- 3. ISSUE CARD WITH PUBLIC KEY ---
          # Providing 'public_key' here tells the API to return 'encrypted_data'
          issue_body = {
              "account_id": ACCOUNT_ID,
              "type": "Virtual",
              "currency_code": "EUR",
              "name": "Golden Kumquat Card",
              "public_key": pub_b64, 
              "3d_secure_settings": {
                  "email": "goldenkumquats@gmail.com",
                  "password": os.getenv("TDS_PASSWORD"),
                  "out_of_band_enabled": True
              },
              "security": {
                  "internet_purchase_enabled": True,
                  "contactless_enabled": True,
                  "withdrawal_enabled": True
              }
          }

          print("🚀 Requesting Card Issuance & RSA Data Exchange...")
          response = requests.post(f"{BASE_URL}/cards", json=issue_body, headers=get_auth_header(), timeout=15)

          if response.status_code not in [200, 201]:
              print(f"❌ Issuance Failed: {response.text}")
              sys.exit(1)

          res_json = response.json()
          card_data = res_json.get('card', {})
          print(f"✅ Card Created: {card_data.get('id')} ({card_data.get('masked_card_number')})")

          # --- 4. DECRYPT SENSITIVE DATA ---
          encrypted_blob_b64 = res_json.get('encrypted_data')
          
          if encrypted_blob_b64:
              print("🔐 Encrypted PAN/CVV detected. Decrypting...")
              try:
                  encrypted_bytes = base64.b64decode(encrypted_blob_b64)
                  decrypted_raw = private_key.decrypt(
                      encrypted_bytes,
                      padding.OAEP(
                          mgf=padding.MGF1(algorithm=hashes.SHA256()),
                          algorithm=hashes.SHA256(),
                          label=None
                      )
                  )
                  
                  # The decrypted result is a JSON string with the PAN, CVV, and Expiry
                  full_details = json.loads(decrypted_raw.decode('utf-8'))
                  
                  print("\n" + "⭐" * 20)
                  print("  SPENDABLE CARD DETAILS")
                  print("⭐" * 20)
                  print(f"PAN:  {full_details.get('pan')}")
                  print(f"CVV:  {full_details.get('cvv')}")
                  print(f"EXP:  {full_details.get('expiry_date')}")
                  print("=" * 40)
              except Exception as de_err:
                  print(f"❌ Decryption Error: {de_err}")
                  print(f"Raw Response: {res_json}")
          else:
              print("⚠️ API success, but no 'encrypted_data' was returned.")
              print("Check if your API Key has 'View Sensitive Data' permissions.")
