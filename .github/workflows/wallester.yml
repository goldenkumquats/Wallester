name: Wallester Final Reveal - Production Reference

on:
  workflow_dispatch:

jobs:
  reveal:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install PyJWT cryptography requests

      - name: Execute
        shell: python
        env:
          API_KEY: ${{ secrets.WALLESTER_API_KEY }}
          B64_PRIVATE_KEY: ${{ secrets.WALLESTER_PRIVATE_KEY }}
          CARD_ID: "d82d7c29-f599-4d39-83b0-0b1a9bf6fed7"
        run: |
          import os, time, jwt, requests, sys, base64, uuid, re, json
          from cryptography.hazmat.primitives import serialization, hashes
          from cryptography.hazmat.primitives.asymmetric import padding
          from datetime import datetime

          # --- 1. KEY LOADING & FORMATTING ---
          try:
              # Decode the GitHub Secret (which is a B64 string of the PEM)
              raw_key_bytes = base64.b64decode(os.getenv("B64_PRIVATE_KEY"))
              private_key = serialization.load_pem_private_key(raw_key_bytes, password=None)
              
              # Derive Public Key in PEM format (SubjectPublicKeyInfo/PKCS#8)
              pub_pem = private_key.public_key().public_bytes(
                  encoding=serialization.Encoding.PEM,
                  format=serialization.PublicFormat.SubjectPublicKeyInfo
              ).decode('utf-8')
              
              # CRITICAL: Wallester expects Base64(PEM_STRING)
              pub_b64_payload = base64.b64encode(pub_pem.encode('utf-8')).decode('utf-8')
          except Exception as e:
              print(f"❌ Key Setup Error: {e}"); sys.exit(1)

          # --- 2. API CONFIGURATION ---
          CARD_ID = os.getenv("CARD_ID")
          headers = {
              "Authorization": f"Bearer {jwt.encode({'api_key': os.getenv('API_KEY'), 'ts': int(time.time())}, private_key, algorithm='RS256')}",
              "X-Request-ID": str(uuid.uuid4()),
              "Content-Type": "application/json"
          }
          body = {"public_key": pub_b64_payload}
          
          # --- 3. API DATA RETRIEVAL ---
          def get_data(url, method="POST", payload=None):
              res = requests.request(method, url, headers=headers, json=payload)
              if res.status_code != 200:
                  print(f"⚠️ Request Failed [{res.status_code}]: {res.text}")
                  return None
              return res.json()

          meta = get_data(f"https://api-frontend.wallester.com/v1/cards/{CARD_ID}", "GET")
          pan_data = get_data(f"https://api-frontend.wallester.com/v1/cards/{CARD_ID}/encrypted-card-number", "POST", body)
          cvv_data = get_data(f"https://api-frontend.wallester.com/v1/cards/{CARD_ID}/encrypted-cvv2", "POST", body)

          # --- 4. DECRYPTION LOGIC ---
          def decrypt_value(encrypted_text, label):
              if not encrypted_text: return None
              # Strip headers/newlines and decode Base64
              clean = re.sub(r'-----BEGIN.*?-----|-----END.*?-----', '', encrypted_text)
              ciphertext = base64.b64decode("".join(clean.split()))
              
              # Try SHA-256 (MGF1 SHA-256) first as it's the confirmed working config
              # Fallback to SHA-1 MGF1 if needed
              for mgf_alg in [hashes.SHA256(), hashes.SHA1()]:
                  try:
                      return private_key.decrypt(
                          ciphertext,
                          padding.OAEP(
                              mgf=padding.MGF1(algorithm=mgf_alg),
                              algorithm=hashes.SHA256(),
                              label=label.encode()
                          )
                      ).decode('utf-8')
                  except:
                      continue
              return None

          # --- 5. FINAL ASSEMBLY ---
          pan = decrypt_value(pan_data.get('encrypted_card_number') if pan_data else None, "CardNumber")
          cvv = decrypt_value(cvv_data.get('encrypted_cvv2') if cvv_data else None, "CVV2")

          if pan and cvv:
              exp_raw = meta.get('card', {}).get('expiry_date', "2000-01-01")
              dt = datetime.strptime(exp_raw.split('T')[0], '%Y-%m-%d')
              print(f"\n✅ SUCCESS\n{'='*40}")
              print(f"RESULT: {pan}|{dt.strftime('%m')}|{dt.strftime('%y')}|{cvv}")
              print(f"{'='*40}")
          else:
              print("❌ Decryption failed. Verify private key and card status.")
              sys.exit(1)
