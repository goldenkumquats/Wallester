name: Issue Wallester Business Card

on:
  workflow_dispatch:
    inputs:
      account_id:
        description: 'The UUID of the Wallester Account'
        required: true
        default: '06691820-662d-43e9-9ac3-29b61d1476d7'

jobs:
  issue-virtual-card:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install PyJWT cryptography requests

      - name: Generate JWT and Request Card
        shell: python
        env:
          API_KEY: ${{ secrets.WALLESTER_API_KEY }}
          PRIVATE_KEY_PEM: ${{ secrets.WALLESTER_PRIVATE_KEY }}
          ACCOUNT_ID: ${{ github.event.inputs.account_id }}
        run: |
          import os, time, jwt, requests, sys, uuid
          from cryptography.hazmat.primitives import serialization

          # 1. Load Environment Variables
          api_key = os.getenv("API_KEY")
          raw_key = os.getenv("PRIVATE_KEY_PEM")
          account_id = os.getenv("ACCOUNT_ID")

          if not raw_key:
              print("❌ Error: WALLESTER_PRIVATE_KEY secret is empty or not found.")
              sys.exit(1)

          # 2. Parse Private Key (Handles PKCS#1 and PKCS#8)
          try:
              # We encode to bytes because the cryptography library requires it
              private_key_obj = serialization.load_pem_private_key(
                  raw_key.encode('utf-8'),
                  password=None  # Change to b"your_pass" if your key is encrypted
              )
          except Exception as e:
              print(f"❌ Private Key Parsing Failed: {e}")
              print("💡 Ensure your GitHub Secret includes the BEGIN/END lines and actual line breaks.")
              sys.exit(1)

          # 3. Generate Token (Do this immediately before the request)
          timestamp = int(time.time())
          payload = {
              "api_key": api_key,
              "ts": timestamp
          }

          try:
              # Passing the object directly to PyJWT solves the 'public key' parsing error
              token = jwt.encode(payload, private_key_obj, algorithm="RS256")
          except Exception as e:
              print(f"❌ JWT Signing Failed: {e}")
              sys.exit(1)

          # 4. API Request
          url = "https://api.wallester.com/v1/cards"
          request_headers = {
              "Authorization": f"Bearer {token}",
              "Content-Type": "application/json",
              "X-Request-ID": str(uuid.uuid4()),
              "User-Agent": "Wallester-GitHub-Provider/1.2"
          }
          
          body = {
              "account_id": account_id,
              "type": "Virtual",
              "currency_code": "EUR"
          }

          print(f"🚀 Sending Request (TS: {timestamp}, RID: {request_headers['X-Request-ID']})")
          
          try:
              response = requests.post(url, json=body, headers=request_headers, timeout=10)
              
              if response.status_code in [200, 201]:
                  print("✅ Success! Card issued.")
                  print(response.json())
              else:
                  print(f"❌ API Rejected Request (Status {response.status_code})")
                  print(f"Response Body: {response.text}")
                  sys.exit(1)
          except Exception as e:
              print(f"❌ Connection Error: {e}")
              sys.exit(1)
