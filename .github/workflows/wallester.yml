name: Wallester - Create and Reveal (Schema Match)

on:
  workflow_dispatch:

jobs:
  create-and-reveal:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install PyJWT cryptography requests

      - name: Execute
        shell: python
        env:
          API_KEY: ${{ secrets.WALLESTER_API_KEY }}
          B64_PRIVATE_KEY: ${{ secrets.WALLESTER_PRIVATE_KEY }}
          PROFILE_ID: ${{ secrets.WALLESTER_PROFILE_ID }}
        run: |
          import os, time, jwt, requests, sys, base64, uuid, re, json
          from cryptography.hazmat.primitives import serialization, hashes
          from cryptography.hazmat.primitives.asymmetric import padding
          from datetime import datetime

          # --- 1. KEY SETUP ---
          b64_str = os.getenv("B64_PRIVATE_KEY").strip()
          private_key = serialization.load_pem_private_key(base64.b64decode(b64_str), password=None)
          pub_pem = private_key.public_key().public_bytes(
              encoding=serialization.Encoding.PEM,
              format=serialization.PublicFormat.SubjectPublicKeyInfo
          ).decode('utf-8')
          pub_b64 = base64.b64encode(pub_pem.encode('utf-8')).decode('utf-8')

          # --- 2. AUTH ---
          def get_headers():
              return {
                  "Authorization": f"Bearer {jwt.encode({'api_key': os.getenv('API_KEY').strip(), 'ts': int(time.time())}, private_key, algorithm='RS256')}",
                  "X-Request-ID": str(uuid.uuid4()),
                  "Content-Type": "application/json"
              }

          # --- 3. CREATE NEW CARD (SCHEMA MATCH) ---
          ACCOUNT_ID = "06691820-662d-43e9-9ac3-29b61d1476d7"
          PROFILE_ID = os.getenv("PROFILE_ID").strip()

          # Matching the sample schema precisely
          create_payload = {
              "account_id": ACCOUNT_ID,
              "card_metadata_profile_id": PROFILE_ID,
              "type": "Virtual",      # Casing matched to sample
              "is_disposable": True,   # Added based on sample properties
              "public_key": pub_b64
          }

          print(f"📡 Sending request with type: {create_payload['type']}")
          res = requests.post("https://api-frontend.wallester.com/v1/cards", 
                             headers=get_headers(), json=create_payload)

          if not res.ok:
              print(f"❌ Creation Failed: {res.status_code}")
              print(f"DEBUG RESPONSE: {res.text}")
              sys.exit(1)

          card_data = res.json()['card']
          CARD_ID = card_data['id']
          print(f"✅ Success! Card ID: {CARD_ID}")

          # --- 4. REVEAL & DECRYPT ---
          def reveal(endpoint, label):
              url = f"https://api-frontend.wallester.com/v1/cards/{CARD_ID}/{endpoint}"
              resp = requests.post(url, headers=get_headers(), json={"public_key": pub_b64})
              if not resp.ok: return None
              
              val = resp.json().get(endpoint.replace('-', '_'))
              clean = re.sub(r'-----BEGIN.*?-----|-----END.*?-----', '', val)
              ciphertext = base64.b64decode("".join(clean.split()))
              
              return private_key.decrypt(
                  ciphertext,
                  padding.OAEP(mgf=padding.MGF1(algorithm=hashes.SHA256()), algorithm=hashes.SHA256(), label=label.encode())
              ).decode('utf-8')

          pan = reveal("encrypted-card-number", "CardNumber")
          cvv = reveal("encrypted-cvv2", "CVV2")

          if pan and cvv:
              dt = datetime.strptime(card_data['expiry_date'].split('T')[0], '%Y-%m-%d')
              print(f"\n✨ NEW CARD CREATED:\n{pan}|{dt.strftime('%m')}|{dt.strftime('%y')}|{cvv}")
