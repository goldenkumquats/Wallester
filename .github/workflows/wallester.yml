name: Wallester Full Detail Reveal

on:
  workflow_dispatch:

jobs:
  reveal-card:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install PyJWT cryptography requests

      - name: Fetch and Format Card
        shell: python
        env:
          API_KEY: ${{ secrets.WALLESTER_API_KEY }}
          B64_PRIVATE_KEY: ${{ secrets.WALLESTER_PRIVATE_KEY }}
        run: |
          import os, time, jwt, requests, sys, base64, uuid, json
          from cryptography.hazmat.primitives import serialization, hashes
          from cryptography.hazmat.primitives.asymmetric import padding
          from datetime import datetime

          # 1. Config
          CARD_ID = "d82d7c29-f599-4d39-83b0-0b1a9bf6fed7"
          BASE_URL = f"https://api-frontend.wallester.com/v1/cards/{CARD_ID}"
          
          # 2. Setup Auth & Keys
          try:
              pem_data = base64.b64decode(os.getenv("B64_PRIVATE_KEY")).decode('utf-8').strip()
              private_key = serialization.load_pem_private_key(pem_data.encode('utf-8'), password=None)
          except Exception as e:
              print(f"❌ Key Error: {e}"); sys.exit(1)

          def get_headers():
              token = jwt.encode({"api_key": os.getenv("API_KEY"), "ts": int(time.time())}, private_key, algorithm="RS256")
              return {"Authorization": f"Bearer {token}", "X-Request-ID": str(uuid.uuid4()), "Accept": "application/json"}

          def decrypt(enc_b64, label=None):
              if not enc_b64: return None
              try:
                  # Try with the specified label (Wallester often requires 'CardNumber' or 'CVV')
                  l_bytes = label.encode() if label else None
                  return private_key.decrypt(
                      base64.b64decode(enc_b64),
                      padding.OAEP(mgf=padding.MGF1(hashes.SHA256()), algorithm=hashes.SHA256(), label=l_bytes)
                  ).decode('utf-8')
              except:
                  # Fallback to no label
                  try:
                      return private_key.decrypt(
                          base64.b64decode(enc_b64),
                          padding.OAEP(mgf=padding.MGF1(hashes.SHA256()), algorithm=hashes.SHA256(), label=None)
                      ).decode('utf-8')
                  except: return None

          # 3. Fetch Data
          h = get_headers()
          
          # Get Metadata (for Expiry)
          res_meta = requests.get(BASE_URL, headers=h)
          # Get PAN
          res_pan = requests.get(f"{BASE_URL}/encrypted-card-number", headers=h)
          # Get CVV
          res_cvv = requests.get(f"{BASE_URL}/encrypted-cvv2", headers=h)

          # 4. Process and Format
          print("\n" + "="*50)
          if res_meta.status_code == 200 and res_pan.status_code == 200 and res_cvv.status_code == 200:
              # Parse Expiry
              # Wallester expiry is usually "2029-08-24T14:15:22Z"
              raw_expiry = res_meta.json().get('card', {}).get('expiry_date', "")
              try:
                  dt = datetime.strptime(raw_expiry.split('T')[0], '%Y-%m-%d')
                  exp_m, exp_y = dt.strftime('%m'), dt.strftime('%y')
              except:
                  exp_m, exp_y = "??", "??"

              # Decrypt PAN and CVV
              full_pan = decrypt(res_pan.json().get('encrypted_card_number'), "CardNumber")
              cvv = decrypt(res_cvv.json().get('encrypted_cvv2'), "CVV")

              if full_pan and cvv:
                  print("✅ CARD DATA RETRIEVED SUCCESSFULLY")
                  print(f"Number: {full_pan}")
                  print(f"CVV:    {cvv}")
                  print(f"Expiry: {exp_m}/{exp_y}")
                  print("-" * 50)
                  print(f"FULL:   {full_pan}|{exp_m}|{exp_y}|{cvv}")
              else:
                  print("❌ Decryption failed. Ensure RSA keys and labels match.")
          else:
              print(f"❌ Error fetching components. PAN:{res_pan.status_code} CVV:{res_cvv.status_code}")
          print("="*50 + "\n")
