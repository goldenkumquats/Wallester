name: Issue Wallester Business Card

on:
  workflow_dispatch:
    inputs:
      account_id:
        description: 'The UUID of the Wallester Account'
        required: true
        default: '06691820-662d-43e9-9ac3-29b61d1476d7'

jobs:
  issue-virtual-card:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install PyJWT cryptography requests

      - name: Generate JWT and Request Card
        shell: python
        env:
          API_KEY: ${{ secrets.WALLESTER_API_KEY }}
          # Expects the base64 string of the entire PEM file
          B64_PRIVATE_KEY: ${{ secrets.WALLESTER_PRIVATE_KEY }}
          ACCOUNT_ID: ${{ github.event.inputs.account_id }}
        run: |
          import os, time, jwt, requests, sys, uuid, base64
          from cryptography.hazmat.primitives import serialization

          # 1. Fetch and Decode Base64 Key
          api_key = os.getenv("API_KEY")
          b64_key = os.getenv("B64_PRIVATE_KEY", "")
          account_id = os.getenv("ACCOUNT_ID")

          if not b64_key:
              print("❌ Error: B64_PRIVATE_KEY secret is empty.")
              sys.exit(1)

          try:
              # Decode from Base64 to get the original PEM string
              decoded_pem = base64.b64decode(b64_key).decode('utf-8').strip()
          except Exception as e:
              print(f"❌ Base64 Decoding Failed: {e}")
              print("💡 Ensure your secret is a valid Base64 string of the PEM file.")
              sys.exit(1)

          # 2. Parse Private Key
          try:
              # Load the key object (handles PKCS#1 and PKCS#8)
              private_key_obj = serialization.load_pem_private_key(
                  decoded_pem.encode('utf-8'),
                  password=None
              )
          except Exception as e:
              print(f"❌ Private Key Parsing Failed: {e}")
              if "InvalidHeader" in str(e):
                  print(f"💡 Header mismatch. First 20 chars of decoded key: {decoded_pem[:20]}")
              sys.exit(1)

          # 3. Generate JWT (5-second window starts now)
          timestamp = int(time.time())
          try:
              token = jwt.encode(
                  {"api_key": api_key, "ts": timestamp}, 
                  private_key_obj, 
                  algorithm="RS256"
              )
          except Exception as e:
              print(f"❌ JWT Signing Failed: {e}")
              sys.exit(1)

          # 4. API Request
          url = "https://api.wallester.com/v1/cards"
          headers = {
              "Authorization": f"Bearer {token}",
              "Content-Type": "application/json",
              "X-Request-ID": str(uuid.uuid4()),
              "User-Agent": "Wallester-GitHub-Action/1.3"
          }
          
          body = {
              "account_id": account_id,
              "type": "Virtual",
              "currency_code": "EUR"
          }

          print(f"🚀 Sending Request (X-Request-ID: {headers['X-Request-ID']})")
          
          try:
              response = requests.post(url, json=body, headers=headers, timeout=10)
              if response.status_code in [200, 201]:
                  print("✅ Success! Card Created.")
                  print(response.json())
              else:
                  print(f"❌ API Error {response.status_code}: {response.text}")
                  sys.exit(1)
          except Exception as e:
              print(f"❌ Connection Error: {e}")
              sys.exit(1)
