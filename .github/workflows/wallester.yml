name: Issue Wallester Business Card

on:
  workflow_dispatch:
    inputs:
      account_id:
        description: 'The UUID of the Wallester Account'
        required: true
      person_id:
        description: 'The UUID of the Person (Cardholder)'
        required: true

jobs:
  issue-virtual-card:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install PyJWT cryptography requests

      - name: Generate JWT and Request Card
        shell: python
        env:
          API_KEY: ${{ secrets.WALLESTER_API_KEY }}
          B64_PRIVATE_KEY: ${{ secrets.WALLESTER_PRIVATE_KEY }}
          ACCOUNT_ID: ${{ github.event.inputs.account_id }}
          PERSON_ID: ${{ github.event.inputs.person_id }}
        run: |
          import os, time, jwt, requests, sys, uuid, base64
          from cryptography.hazmat.primitives import serialization

          # 1. Decode Key
          try:
              b64_key = os.getenv("B64_PRIVATE_KEY", "")
              decoded_pem = base64.b64decode(b64_key).decode('utf-8').strip()
              private_key_obj = serialization.load_pem_private_key(decoded_pem.encode('utf-8'), password=None)
          except Exception as e:
              print(f"❌ Key Error: {e}")
              sys.exit(1)

          # 2. JWT (5s window)
          token = jwt.encode({"api_key": os.getenv("API_KEY"), "ts": int(time.time())}, private_key_obj, algorithm="RS256")

          # 3. Correct v1 Business Endpoint
          # In v1, issuance is a top-level POST to /cards
          url = "https://api-frontend.wallester.com/v1/cards"
          
          headers = {
              "Authorization": f"Bearer {token}",
              "Content-Type": "application/json",
              "X-Request-ID": str(uuid.uuid4())
          }
          
          body = {
              "account_id": os.getenv("ACCOUNT_ID"),
              "person_id": os.getenv("PERSON_ID"),
              "type": "Virtual",
              "currency_code": "EUR",
              "description": "GH Action Issuance"
          }

          print(f"🚀 POSTing to {url}")
          response = requests.post(url, json=body, headers=headers, timeout=15)

          if response.status_code in [200, 201]:
              print("✅ Success!")
              print(response.json())
          else:
              print(f"❌ Failed {response.status_code}: {response.text}")
              sys.exit(1)
