name: Wallester Reveal - Final Hash Logic

on:
  workflow_dispatch:

jobs:
  reveal:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install PyJWT cryptography requests

      - name: Execute
        shell: python
        env:
          API_KEY: ${{ secrets.WALLESTER_API_KEY }}
          B64_PRIVATE_KEY: ${{ secrets.WALLESTER_PRIVATE_KEY }}
        run: |
          import os, time, jwt, requests, sys, base64, uuid, re
          from cryptography.hazmat.primitives import serialization, hashes
          from cryptography.hazmat.primitives.asymmetric import padding
          from datetime import datetime

          # 1. SETUP
          print("🛠️ [DEBUG] Loading Keys...")
          try:
              pem_data = base64.b64decode(os.getenv("B64_PRIVATE_KEY")).decode('utf-8').strip()
              private_key = serialization.load_pem_private_key(pem_data.encode('utf-8'), password=None)
              pub_bytes = private_key.public_key().public_bytes(
                  encoding=serialization.Encoding.PEM,
                  format=serialization.PublicFormat.SubjectPublicKeyInfo
              )
              pub_b64 = base64.b64encode(pub_bytes).decode('utf-8')
          except Exception as e:
              print(f"❌ Key Error: {e}"); sys.exit(1)

          def clean_and_decrypt(pem_string, label_text):
              if not pem_string: return None
              # Strip PEM wrapper
              clean = re.sub(r'-----BEGIN.*?-----', '', pem_string)
              clean = re.sub(r'-----END.*?-----', '', clean)
              clean = "".join(clean.split())
              ciphertext = base64.b64decode(clean)
              
              print(f"\n🔓 Testing {label_text} (Clean Len: {len(clean)})...")

              # TRY 1: SHA-256 Algorithm with SHA-1 MGF1 (Common in Banking HSMs)
              try:
                  print(f"   ⏳ Attempting SHA-256 with SHA-1 MGF1...")
                  return private_key.decrypt(
                      ciphertext,
                      padding.OAEP(
                          mgf=padding.MGF1(algorithm=hashes.SHA1()),
                          algorithm=hashes.SHA256(),
                          label=label_text.encode()
                      )
                  ).decode('utf-8')
              except: pass

              # TRY 2: Pure SHA-256 everywhere
              try:
                  print(f"   ⏳ Attempting Pure SHA-256...")
                  return private_key.decrypt(
                      ciphertext,
                      padding.OAEP(
                          mgf=padding.MGF1(algorithm=hashes.SHA256()),
                          algorithm=hashes.SHA256(),
                          label=label_text.encode()
                      )
                  ).decode('utf-8')
              except: pass

              # TRY 3: Pure SHA-1 everywhere (Legacy)
              try:
                  print(f"   ⏳ Attempting Pure SHA-1...")
                  return private_key.decrypt(
                      ciphertext,
                      padding.OAEP(
                          mgf=padding.MGF1(algorithm=hashes.SHA1()),
                          algorithm=hashes.SHA1(),
                          label=label_text.encode()
                      )
                  ).decode('utf-8')
              except: pass

              return None

          # 2. CALLS
          CARD_ID = "d82d7c29-f599-4d39-83b0-0b1a9bf6fed7"
          headers = {
              "Authorization": f"Bearer {jwt.encode({'api_key': os.getenv('API_KEY'), 'ts': int(time.time())}, private_key, algorithm='RS256')}",
              "X-Request-ID": str(uuid.uuid4()),
              "Content-Type": "application/json"
          }
          body = {"public_key": pub_b64}

          res_m = requests.get(f"https://api-frontend.wallester.com/v1/cards/{CARD_ID}", headers=headers).json()
          res_p = requests.post(f"https://api-frontend.wallester.com/v1/cards/{CARD_ID}/encrypted-card-number", headers=headers, json=body).json()
          res_c = requests.post(f"https://api-frontend.wallester.com/v1/cards/{CARD_ID}/encrypted-cvv2", headers=headers, json=body).json()

          # 3. OUTPUT
          pan = clean_and_decrypt(res_p.get('encrypted_card_number'), "CardNumber")
          cvv = clean_and_decrypt(res_c.get('encrypted_cvv2'), "CVV")

          if pan and cvv:
              exp = res_m.get('card', {}).get('expiry_date', "2000-01-01")
              dt = datetime.strptime(exp.split('T')[0], '%Y-%m-%d')
              print(f"\nRESULT: {pan}|{dt.strftime('%m')}|{dt.strftime('%y')}|{cvv}")
          else:
              print("\n❌ All known decryption methods failed.")
