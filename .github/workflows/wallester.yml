name: Wallester - Create and Reveal (Full Lifecycle)

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install Dependencies
        run: pip install PyJWT cryptography requests
      - name: Execute
        shell: python
        env:
          API_KEY: ${{ secrets.WALLESTER_API_KEY }}
          B64_PRIVATE_KEY: ${{ secrets.WALLESTER_PRIVATE_KEY }}
          PROFILE_ID: ${{ secrets.WALLESTER_PROFILE_ID }}
          ACCOUNT_ID: "06691820-662d-43e9-9ac3-29b61d1476d7"
        run: |
          import os, time, jwt, requests, sys, base64, uuid, re, json
          from cryptography.hazmat.primitives import serialization, hashes
          from cryptography.hazmat.primitives.asymmetric import padding
          from datetime import datetime

          # 1. KEY SETUP (Double-Wrap Logic)
          try:
              b64_key = os.getenv("B64_PRIVATE_KEY").strip()
              priv_key = serialization.load_pem_private_key(base64.b64decode(b64_key), password=None)
              pub_pem = priv_key.public_key().public_bytes(
                  encoding=serialization.Encoding.PEM,
                  format=serialization.PublicFormat.SubjectPublicKeyInfo
              ).decode('utf-8')
              pub_b64 = base64.b64encode(pub_pem.encode('utf-8')).decode('utf-8')
          except Exception as e:
              print(f"❌ Key Error: {e}"); sys.exit(1)

          # 2. AUTH HEADERS
          headers = {
              "Authorization": f"Bearer {jwt.encode({'api_key': os.getenv('API_KEY').strip(), 'ts': int(time.time())}, priv_key, algorithm='RS256')}",
              "X-Request-ID": str(uuid.uuid4()),
              "Content-Type": "application/json"
          }

          # 3. CREATE CARD WITH 3DS SETTINGS
          create_payload = {
              "account_id": os.getenv("ACCOUNT_ID"),
              "card_metadata_profile_id": os.getenv("PROFILE_ID").strip(),
              "type": "Virtual",
              "public_key": pub_b64,
              "3d_secure_settings": {
                  "email": "dev-alerts@example.com", # Required for OTP
                  "mobile": "+1234567890"            # Required for SMS 3DS
              }
          }

          print("🆕 Initializing Card with 3DS settings...")
          res = requests.post("https://api-frontend.wallester.com/v1/cards", headers=headers, json=create_payload)
          if not res.ok:
              print(f"❌ Creation Failed: {res.text}"); sys.exit(1)
          
          card_data = res.json()['card']
          CID = card_data['id']
          print(f"✅ Created: {CID}")

          # 4. REVEAL & EXHAUSTIVE DECRYPT
          def decrypt(endpoint, labels):
              url = f"https://api-frontend.wallester.com/v1/cards/{CID}/{endpoint}"
              resp = requests.post(url, headers=headers, json={"public_key": pub_b64})
              if not resp.ok: return None
              
              enc_data = resp.json().get(endpoint.replace('-', '_'))
              raw_cipher = base64.b64decode("".join(re.sub(r'-----BEGIN.*?-----|-----END.*?-----', '', enc_data).split()))
              
              # Loop through verified labels and MGF1 algorithms
              for mgf in [hashes.SHA256(), hashes.SHA1()]:
                  for lbl in labels:
                      try:
                          return priv_key.decrypt(
                              raw_cipher,
                              padding.OAEP(mgf=padding.MGF1(algorithm=mgf), algorithm=hashes.SHA256(), label=lbl.encode())
                          ).decode('utf-8')
                      except: continue
              return None

          pan = decrypt("encrypted-card-number", ["CardNumber"])
          cvv = decrypt("encrypted-cvv2", ["CVV2", "CVV"])

          if pan and cvv:
              dt = datetime.strptime(card_data['expiry_date'].split('T')[0], '%Y-%m-%d')
              print(f"\n✨ FINAL RESULT: {pan}|{dt.strftime('%m')}|{dt.strftime('%y')}|{cvv}")
          else:
              print(f"❌ Decrypt Failed. PAN: {pan}, CVV: {cvv}")
