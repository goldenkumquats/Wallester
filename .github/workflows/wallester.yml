name: Wallester List Company Cards

on:
  workflow_dispatch:

jobs:
  list-cards:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install PyJWT cryptography requests

      - name: Fetch Cards
        shell: python
        env:
          API_KEY: ${{ secrets.WALLESTER_API_KEY }}
          B64_PRIVATE_KEY: ${{ secrets.WALLESTER_PRIVATE_KEY }}
        run: |
          import os, time, jwt, requests, sys, base64, uuid
          from cryptography.hazmat.primitives import serialization

          # 1. Setup
          COMPANY_ID = "06691820-662d-43e9-9ac3-29b61d1476d7"
          URL = f"https://api-frontend.wallester.com/v1/companies/{COMPANY_ID}/cards"

          try:
              pem_data = base64.b64decode(os.getenv("B64_PRIVATE_KEY")).decode('utf-8').strip()
              private_key = serialization.load_pem_private_key(pem_data.encode('utf-8'), password=None)
          except Exception as e:
              print(f"❌ Key Error: {e}"); sys.exit(1)

          # 2. JWT Generation
          token = jwt.encode(
              {"api_key": os.getenv("API_KEY"), "ts": int(time.time())}, 
              private_key, 
              algorithm="RS256"
          )

          # 3. Request
          headers = {
              "Authorization": f"Bearer {token}",
              "X-Request-ID": str(uuid.uuid4())
          }
          
          print(f"📡 Fetching cards for company {COMPANY_ID}...")
          response = requests.get(URL, headers=headers, timeout=15)

          if response.status_code == 200:
              data = response.json()
              cards = data.get('cards', [])
              print(f"✅ Found {len(cards)} cards.\n")
              
              for card in cards:
                  print(f"ID: {card.get('id')}")
                  print(f"Name: {card.get('name')}")
                  print(f"Masked: {card.get('masked_card_number')}")
                  print(f"Status: {card.get('status')}")
                  print("-" * 20)
          else:
              print(f"❌ Failed: {response.status_code}")
              print(response.text)
