name: Wallester Card Issuance HelloWorld

on:
  workflow_dispatch:
    inputs:
      account_id:
        description: 'The UUID of the Account to link'
        required: true
        default: '06691820-662d-43e9-9ac3-29b61d1476d7'

jobs:
  issue-card:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install PyJWT cryptography requests

      - name: Issue Virtual Card
        shell: python
        env:
          API_KEY: ${{ secrets.WALLESTER_API_KEY }}
          B64_PRIVATE_KEY: ${{ secrets.WALLESTER_PRIVATE_KEY }}
          ACCOUNT_ID: ${{ github.event.inputs.account_id }}
        run: |
          import os, time, jwt, requests, sys, base64, uuid
          from cryptography.hazmat.primitives import serialization

          # 1. Load Keys
          try:
              b64_key = os.getenv("B64_PRIVATE_KEY", "")
              pem_data = base64.b64decode(b64_key).decode('utf-8').strip()
              private_key = serialization.load_pem_private_key(pem_data.encode('utf-8'), password=None)
          except Exception as e:
              print(f"❌ Key Error: {e}"); sys.exit(1)

          # 2. JWT Token (api_key + ts)
          # Generated 5s before request per docs
          token = jwt.encode(
              {"api_key": os.getenv("API_KEY"), "ts": int(time.time())}, 
              private_key, 
              algorithm="RS256"
          )

          # 3. Request Execution
          url = "https://api-frontend.wallester.com/v1/cards"
          headers = {
              "Authorization": f"Bearer {token}",
              "Content-Type": "application/json",
              "X-Request-ID": str(uuid.uuid4()) # Mandatory for tracking
          }
          
          # Minimal body for a Virtual Card issuance
          body = {
              "account_id": os.getenv("ACCOUNT_ID"),
              "type": "Virtual",
              "currency_code": "EUR",
              "description": "Hello World Card"
          }

          print(f"🚀 POST {url}")
          response = requests.post(url, json=body, headers=headers)

          if response.status_code in [200, 201]:
              print("✅ Success!")
              print(response.json())
          else:
              print(f"❌ Failed: {response.status_code}")
              print(response.text)
              sys.exit(1)
