name: Wallester Deep Inspection

on:
  workflow_dispatch:

jobs:
  debug-api:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
          run: pip install PyJWT cryptography requests

      - name: Full JSON Dump
        shell: python
        env:
          API_KEY: ${{ secrets.WALLESTER_API_KEY }}
          B64_PRIVATE_KEY: ${{ secrets.WALLESTER_PRIVATE_KEY }}
        run: |
          import os, time, jwt, requests, sys, base64, uuid, json
          from cryptography.hazmat.primitives import serialization

          # 1. Auth
          CARD_ID = "d82d7c29-f599-4d39-83b0-0b1a9bf6fed7"
          pem_data = base64.b64decode(os.getenv("B64_PRIVATE_KEY")).decode('utf-8').strip()
          private_key = serialization.load_pem_private_key(pem_data.encode('utf-8'), password=None)
          token = jwt.encode({"api_key": os.getenv("API_KEY"), "ts": int(time.time())}, private_key, algorithm="RS256")
          
          # 2. Fetch with ALL possible headers
          headers = {
              "Authorization": f"Bearer {token}",
              "X-Request-ID": str(uuid.uuid4()),
              "Accept": "application/json"
          }
          
          # We try the GET /v1/cards/{id} but check EVERY field
          res = requests.get(f"https://api-frontend.wallester.com/v1/cards/{CARD_ID}", headers=headers)
          
          print("--- FULL API RESPONSE KEYS ---")
          print(json.dumps(res.json(), indent=2))
          print("------------------------------")
