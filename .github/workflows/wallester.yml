name: Wallester Reveal (Base64 Padding Fix)

on:
  workflow_dispatch:

jobs:
  reveal-details:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
          run: pip install PyJWT cryptography requests

      - name: Execute
        shell: python
        env:
          API_KEY: ${{ secrets.WALLESTER_API_KEY }}
          B64_PRIVATE_KEY: ${{ secrets.WALLESTER_PRIVATE_KEY }}
        run: |
          import os, time, jwt, requests, sys, base64, uuid, json, binascii
          from cryptography.hazmat.primitives import serialization, hashes
          from cryptography.hazmat.primitives.asymmetric import padding
          from datetime import datetime

          CARD_ID = "d82d7c29-f599-4d39-83b0-0b1a9bf6fed7"
          BASE_URL = f"https://api-frontend.wallester.com/v1/cards/{CARD_ID}"
          
          try:
              pem_data = base64.b64decode(os.getenv("B64_PRIVATE_KEY")).decode('utf-8').strip()
              private_key = serialization.load_pem_private_key(pem_data.encode('utf-8'), password=None)
              pub_pem = private_key.public_key().public_bytes(
                  encoding=serialization.Encoding.PEM,
                  format=serialization.PublicFormat.SubjectPublicKeyInfo
              )
              pub_b64 = base64.b64encode(pub_pem).decode('utf-8')
          except Exception as e:
              print(f"❌ Key Error: {e}"); sys.exit(1)

          def safe_b64decode(data):
              """Fixes padding and strips whitespace for problematic base64 strings."""
              if not data: return None
              data = data.strip()
              # If it's a JWE (contains dots), we only want the ciphertext part (usually index 3)
              if "." in data:
                  parts = data.split(".")
                  print(f"   [Note] JWE detected ({len(parts)} parts). Using ciphertext component.")
                  data = parts[3] if len(parts) > 3 else parts[0]
              
              missing_padding = len(data) % 4
              if missing_padding:
                  data += '=' * (4 - missing_padding)
              try:
                  return base64.b64decode(data)
              except Exception as e:
                  print(f"   [Error] Could not decode string: {e}")
                  return None

          def multi_decrypt(enc_str, label_str):
              ciphertext = safe_b64decode(enc_str)
              if not ciphertext: return None
              
              for h_alg in [hashes.SHA256(), hashes.SHA1()]:
                  for lbl in [label_str.encode(), None]:
                      try:
                          return private_key.decrypt(
                              ciphertext,
                              padding.OAEP(mgf=padding.MGF1(algorithm=h_alg), algorithm=h_alg, label=lbl)
                          ).decode('utf-8')
                      except: continue
              return None

          h = {"Authorization": f"Bearer {jwt.encode({'api_key': os.getenv('API_KEY'), 'ts': int(time.time())}, private_key, algorithm='RS256')}", "X-Request-ID": str(uuid.uuid4()), "Content-Type": "application/json"}
          p = {"public_key": pub_b64}
          
          res_m = requests.get(BASE_URL, headers=h)
          res_p = requests.post(f"{BASE_URL}/encrypted-card-number", headers=h, json=p)
          res_c = requests.post(f"{BASE_URL}/encrypted-cvv2", headers=h, json=p)

          if res_p.status_code == 200 and res_c.status_code == 200:
              exp = res_m.json().get('card', {}).get('expiry_date', "2000-01-01")
              dt = datetime.strptime(exp.split('T')[0], '%Y-%m-%d')
              
              pan = multi_decrypt(res_p.json().get('encrypted_card_number'), "CardNumber")
              cvv = multi_decrypt(res_c.json().get('encrypted_cvv2'), "CVV")

              if pan and cvv:
                  print(f"\nRESULT: {pan}|{dt.strftime('%m')}|{dt.strftime('%y')}|{cvv}")
              else:
                  print("❌ Decryption failed. Raw sample:", res_p.json().get('encrypted_card_number')[:30])
          else:
              print(f"❌ API Error: {res_p.status_code}")
