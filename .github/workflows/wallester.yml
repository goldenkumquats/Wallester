name: Issue Wallester Business Card

on:
  workflow_dispatch:
    inputs:
      account_id:
        description: 'The UUID of the Wallester Account'
        required: true
        default: 'insert-account-uuid-here'

jobs:
  issue-virtual-card:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install PyJWT cryptography requests

  

      - name: Generate JWT and Request Card
        shell: python
        env:
          API_KEY: ${{ secrets.WALLESTER_API_KEY }}
          PRIVATE_KEY: ${{ secrets.WALLESTER_PRIVATE_KEY }}
          ACCOUNT_ID: ${{ github.event.inputs.account_id }}
        run: |
          import os
          import time
          import jwt
          import requests
          import sys

          # 1. Load Secrets
          api_key = os.getenv("API_KEY")
          private_key_pem = os.getenv("PRIVATE_KEY")
          account_id = os.getenv("ACCOUNT_ID")

          if not api_key or not private_key_pem:
              print("❌ Error: Missing WALLESTER_API_KEY or WALLESTER_PRIVATE_KEY in Secrets.")
              sys.exit(1)

          # 2. Prepare JWT Payload (Claims)
          # 'ts' must be current UNIX timestamp. Wallester allows a 5s window.
          payload = {
              "api_key": api_key,
              "ts": int(time.time())
          }

          # 3. Sign the JWT using RS256
          try:
              token = jwt.encode(payload, private_key_pem, algorithm="RS256")
          except Exception as e:
              print(f"❌ Signing Failed: {e}")
              sys.exit(1)

          # 4. Define API Call
          # Replace 'api.wallester.com' with the correct environment host if different
          url = "https://api.wallester.com/v1/cards"
          
          headers = {
              "Authorization": f"Bearer {token}",
              "Content-Type": "application/json"
          }

          body = {
              "account_id": account_id,
              "type": "Virtual",
              "currency_code": "EUR"
          }

          # 5. Execute Request
          print(f"🚀 Sending request to Wallester for Account: {account_id}...")
          response = requests.post(url, json=body, headers=headers)

          if response.status_code == 200 or response.status_code == 201:
              print("✅ Success! Card Created.")
              print(response.json())
          else:
              print(f"❌ Failed. Status: {response.status_code}")
              print(f"Response: {response.text}")
              sys.exit(1)
