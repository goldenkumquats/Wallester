name: Issue Wallester Business Card

on:
  workflow_dispatch:
    inputs:
      account_id:
        description: 'The UUID of the Wallester Account'
        required: true
        default: '06691820-662d-43e9-9ac3-29b61d1476d7'

jobs:
  issue-virtual-card:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install PyJWT cryptography requests

      - name: Generate JWT and Request Card
        shell: python
        env:
          API_KEY: ${{ secrets.WALLESTER_API_KEY }}
          B64_PRIVATE_KEY: ${{ secrets.WALLESTER_PRIVATE_KEY }}
          ACCOUNT_ID: ${{ github.event.inputs.account_id }}
        run: |
          import os, time, jwt, requests, base64, sys

          # 1. Load and Decode Private Key
          api_key = os.getenv("API_KEY")
          b64_key = os.getenv("B64_PRIVATE_KEY")
          account_id = os.getenv("ACCOUNT_ID")

          try:
              # Decoding the Base64 version of your 'example_private' file
              private_key_pem = base64.b64decode(b64_key).decode('utf-8')
          except Exception as e:
              print(f"❌ Key Decode Failed: {e}")
              sys.exit(1)

          # 2. Create Claims EXACTLY as per your documentation
          # Headers for the JWT (Standard for RS256)
          headers = {"alg": "RS256", "typ": "JWT"}
          
          payload = {
              "api_key": api_key,
              "ts": int(time.time())
          }

          # 3. Sign the JWT
          try:
              token = jwt.encode(payload, private_key_pem, algorithm="RS256", headers=headers)
          except Exception as e:
              print(f"❌ Signing Failed: {e}")
              sys.exit(1)

          # 4. API Request
          url = "https://api.wallester.com/v1/cards"
          
          # Adding a common User-Agent to bypass OpenResty 403 firewall
          request_headers = {
              "Authorization": f"Bearer {token}",
              "Content-Type": "application/json",
              "User-Agent": "Mozilla/5.0 (Macintosh; Intel Mac OS X 10_15_7) Wallester-Integration/1.0"
          }
          
          body = {
              "account_id": account_id,
              "type": "Virtual",
              "currency_code": "EUR"
          }

          print(f"🚀 Sending request for Account: {account_id}...")
          response = requests.post(url, json=body, headers=request_headers)

          if response.status_code in [200, 201]:
              print("✅ Success! Card Created.")
              print(response.json())
          else:
              print(f"❌ Failed. Status: {response.status_code}")
              print(f"Response Body: {response.text}")
              
              if response.status_code == 403:
                  print("\n💡 Note: If code is correct, check Wallester portal for 'KYB Verification' status.")
              sys.exit(1)
