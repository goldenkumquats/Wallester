name: Wallester Card Issuance HelloWorld

on:
  workflow_dispatch:

jobs:
  issue-card:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install PyJWT cryptography requests

      - name: Issue Virtual Card
        shell: python
        env:
          API_KEY: ${{ secrets.WALLESTER_API_KEY }}
          B64_PRIVATE_KEY: ${{ secrets.WALLESTER_PRIVATE_KEY }}
        run: |
          import os, time, jwt, requests, sys, base64, uuid
          from cryptography.hazmat.primitives import serialization

          # 1. Setup Constants
          ACCOUNT_ID = "06691820-662d-43e9-9ac3-29b61d1476d7"
          API_URL = "https://api-frontend.wallester.com/v1/cards"

          # 2. Load and Decode Private Key
          try:
              b64_key = os.getenv("B64_PRIVATE_KEY", "")
              pem_data = base64.b64decode(b64_key).decode('utf-8').strip()
              private_key = serialization.load_pem_private_key(
                  pem_data.encode('utf-8'), 
                  password=None
              )
          except Exception as e:
              print(f"❌ Key Error: {e}")
              sys.exit(1)

          # 3. Generate JWT (Claims: api_key, ts)
          token = jwt.encode(
              {
                  "api_key": os.getenv("API_KEY"), 
                  "ts": int(time.time())
              }, 
              private_key, 
              algorithm="RS256"
          )

          # 4. Request Execution
          headers = {
              "Authorization": f"Bearer {token}",
              "Content-Type": "application/json",
              "X-Request-ID": str(uuid.uuid4())
          }
          
          body = {
              "account_id": ACCOUNT_ID,
              "type": "Virtual",
              "currency_code": "EUR",
              "description": "GH Action Hello World",
              "card_3d_secure_settings": {
                  "is_enabled": True,
                  "type": "Default"
              }
          }

          print(f"🚀 POST {API_URL}")
          try:
              response = requests.post(API_URL, json=body, headers=headers, timeout=15)
              
              if response.status_code in [200, 201]:
                  print("✅ Success! Card Issued.")
                  print(response.json())
              else:
                  print(f"❌ Failed: {response.status_code}")
                  print(f"Response Body: {response.text}")
                  sys.exit(1)
          except Exception as e:
              print(f"❌ Request Error: {e}")
              sys.exit(1)
