name: Wallester API Hello World

on:
  workflow_dispatch:

jobs:
  test-connection:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install PyJWT cryptography requests

      - name: Authenticate and List Accounts
        shell: python
        env:
          API_KEY: ${{ secrets.WALLESTER_API_KEY }}
          # Store the Private Key as a Base64 string in GitHub Secrets
          B64_PRIVATE_KEY: ${{ secrets.WALLESTER_PRIVATE_KEY }}
        run: |
          import os, time, jwt, requests, sys, base64
          from cryptography.hazmat.primitives import serialization

          # 1. Load and Decode Private Key
          try:
              b64_key = os.getenv("B64_PRIVATE_KEY", "")
              # Decode Base64 to get PEM string, then load as RSA object
              pem_data = base64.b64decode(b64_key).decode('utf-8').strip()
              private_key = serialization.load_pem_private_key(
                  pem_data.encode('utf-8'), 
                  password=None
              )
          except Exception as e:
              print(f"❌ Key Setup Failed: {e}")
              sys.exit(1)

          # 2. Create JWT (Claims: api_key, ts)
          # ts must be current UNIX timestamp and cannot be in the past
          payload = {
              "api_key": os.getenv("API_KEY"),
              "ts": int(time.time())
          }

          try:
              # Wallester requires RS256 signing
              token = jwt.encode(payload, private_key, algorithm="RS256")
          except Exception as e:
              print(f"❌ JWT Generation Failed: {e}")
              sys.exit(1)

          # 3. Faithful Hello World Request: Search Accounts
          # Documentation: GET /v1/accounts
          url = "https://api.wallester.com/v1/accounts"
          
          # Pagination params required by documentation
          params = {
              "from_record": 0,
              "records_count": 10
          }
          
          headers = {
              "Authorization": f"Bearer {token}",
              "Content-Type": "application/json"
          }

          print(f"🚀 Connecting to Wallester API...")
          response = requests.get(url, headers=headers, params=params)

          if response.status_code == 200:
              print("✅ Connection Successful!")
              accounts = response.json().get("accounts", [])
              print(f"Found {len(accounts)} accounts.")
              for acc in accounts:
                  print(f"- {acc.get('name')} (ID: {acc.get('id')}) | Balance: {acc.get('available_amount')} {acc.get('currency_code')}")
          else:
              print(f"❌ Connection Failed ({response.status_code})")
              print(f"Response: {response.text}")
              sys.exit(1)
